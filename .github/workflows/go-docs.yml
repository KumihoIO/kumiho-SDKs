# Kumiho Go SDK - Documentation Publishing Workflow
#
# Runs from the monorepo root. Generates a Go API reference with gomarkdoc,
# builds it (plus the narrative pages) into HTML with Sphinx, and deploys to
# docs.kumiho.io/go.

name: Go Docs

on:
  push:
    branches:
      - main
    paths:
      - 'go/**'
      - '.github/workflows/go-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-go"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gomarkdoc
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate Go API reference (gomarkdoc)
        run: gomarkdoc --output docs/api.md ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: go/docs/requirements.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Extract version from doc.go
        id: get_version
        run: |
          VERSION=$(grep -m1 'Version =' doc.go | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building docs for Kumiho Go SDK v$VERSION"

      - name: Build Sphinx documentation
        run: sphinx-build -b html docs docs/_build/html
        env:
          SPHINXBUILD: sphinx-build

      - name: Add version badge to output
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Kumiho Go SDK v$VERSION" > docs/_build/html/VERSION.txt

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs-go
          path: go/docs/_build/html
          retention-days: 7

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    # Serialize all SDK doc deploys: every *-docs workflow pushes to the SAME
    # docs.kumiho.io repo, so concurrent pushes race (non-fast-forward). A shared
    # concurrency group forces the deploy jobs to run one at a time.
    concurrency:
      group: docs-kumiho-io-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://docs.kumiho.io/go

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: sphinx-docs-go
          path: docs-html

      - name: Deploy to docs.kumiho.io repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: kumihoclouds/docs.kumiho.io
          publish_branch: main
          publish_dir: docs-html
          destination_dir: go
          keep_files: true
          commit_message: "docs(go): update to v${{ needs.build-docs.outputs.version }}"
