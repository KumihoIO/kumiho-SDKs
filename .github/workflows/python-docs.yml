# Kumiho Python SDK - Documentation Publishing Workflow
#
# Runs from the monorepo root. Builds Sphinx documentation (with the version
# from kumiho.__version__) and deploys it to docs.kumiho.io/python.
#
# For PyPI publishing see sdk-publish.yml (triggered by sdk-v* tags).

name: Python Docs

on:
  push:
    branches:
      - main
    paths:
      - 'python/python/**'
      - '.github/workflows/python-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-python"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python/python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r docs/requirements.txt

      - name: Extract version from kumiho package
        id: get_version
        run: |
          VERSION=$(python -c "import kumiho; print(kumiho.__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building docs for Kumiho Python SDK v$VERSION"

      - name: Build Sphinx documentation
        run: |
          cd docs
          # Not using -W (warnings as errors): duplicate object warnings are
          # expected for re-exported symbols in __init__.py.
          make html
        env:
          SPHINXBUILD: sphinx-build

      - name: Add version badge to output
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Kumiho Python SDK v$VERSION" > docs/_build/html/VERSION.txt

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs-python
          path: python/python/docs/_build/html
          retention-days: 7

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://docs.kumiho.io/python

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: sphinx-docs-python
          path: docs-html

      - name: Deploy to docs.kumiho.io repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: kumihoclouds/docs.kumiho.io
          publish_branch: main
          publish_dir: docs-html
          destination_dir: python
          keep_files: true
          commit_message: "docs(python): update to v${{ needs.build-docs.outputs.version }}"
