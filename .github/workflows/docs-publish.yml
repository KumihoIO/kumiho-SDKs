# Kumiho C++ SDK - Documentation Publishing Workflow
#
# This workflow:
# 1. Generates Doxygen XML from documentation comments
# 2. Builds Sphinx HTML (Breathe) from that XML
# 3. Deploys documentation to docs.kumiho.io/cpp

name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'include/**'
      - 'src/**'
      - 'proto/**'
      - 'docs/**'
      - 'README.md'
      - 'CMakeLists.txt'
      - 'Doxyfile'
      - '.github/workflows/docs-publish.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-cpp"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================================================
  # Build Documentation
  # ==========================================================================
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Extract version from CMakeLists.txt
        id: get_version
        run: |
          VERSION=$(python -c "import re; from pathlib import Path; text=Path('CMakeLists.txt').read_text(encoding='utf-8', errors='replace'); m=re.search(r'project\\([^\\)]*\\bVERSION\\s+([0-9]+\\.[0-9]+\\.[0-9]+(?:[-+._a-zA-Z0-9]*)?)\\b', text); import sys; sys.exit('Could not extract VERSION from CMakeLists.txt') if not m else None; print(m.group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building docs for Kumiho C++ SDK v$VERSION"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Tag version: $TAG_VERSION"
          echo "CMake version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Version mismatch! Tag: $TAG_VERSION, CMake: $PKG_VERSION"
            exit 1
          fi
          echo "✅ Version verified: $PKG_VERSION"

      - name: Generate Doxygen XML (for Sphinx/Breathe)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Patch PROJECT_NUMBER for this run (don’t modify tracked file)
          sed -E "s/^(PROJECT_NUMBER[[:space:]]*=).*/\1 \"$VERSION\"/" docs/Doxyfile.sphinx > docs/Doxyfile.sphinx.ci
          doxygen docs/Doxyfile.sphinx.ci

      - name: Build Sphinx documentation
        run: |
          sphinx-build -b html docs docs/_build/html
        env:
          SPHINXBUILD: sphinx-build

      - name: Add version badge to output
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Kumiho C++ SDK v$VERSION" > docs/_build/html/VERSION.txt

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs
          path: docs/_build/html
          retention-days: 7

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

  # ==========================================================================
  # Deploy Documentation to docs.kumiho.io/cpp
  # ==========================================================================
  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://docs.kumiho.io/cpp

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: sphinx-docs
          path: docs-html

      - name: Deploy to docs.kumiho.io repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: kumihoclouds/docs.kumiho.io
          publish_branch: main
          publish_dir: docs-html
          destination_dir: cpp
          keep_files: true
          commit_message: "docs(cpp): update to v${{ needs.build-docs.outputs.version }}"
