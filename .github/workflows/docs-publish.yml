# Kumiho Python SDK - Documentation & PyPI Publishing Workflow
#
# This workflow:
# 1. Builds Sphinx documentation with version from kumiho.__version__
# 2. Deploys documentation to GitHub Pages
# 3. Publishes package to PyPI (on release tags)

name: Docs & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'python/**'
      - 'docs/**'
      - '.github/workflows/docs-publish.yml'
    tags:
      - 'v*'  # Trigger on version tags like v0.3.0
  pull_request:
    branches:
      - main
    paths:
      - 'python/**'
      - 'docs/**'
  workflow_dispatch:  # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ===========================================================================
  # Build Documentation
  # ===========================================================================
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r docs/requirements.txt

      - name: Extract version from kumiho package
        id: get_version
        run: |
          VERSION=$(python -c "import kumiho; print(kumiho.__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building docs for Kumiho Python SDK v$VERSION"

      - name: Update conf.py with version
        run: |
          # Ensure conf.py uses the package version dynamically
          cd docs
          python -c "
          import sys
          sys.path.insert(0, '..')
          import kumiho
          print(f'Documentation version: {kumiho.__version__}')
          "

      - name: Build Sphinx documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"
        env:
          SPHINXBUILD: sphinx-build

      - name: Add version badge to index
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Add a version indicator to the built docs
          echo "Kumiho Python SDK v$VERSION" > docs/_build/html/VERSION.txt

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: python/docs/_build/html

      - name: Upload docs for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs
          path: python/docs/_build/html
          retention-days: 7

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

  # ===========================================================================
  # Deploy Documentation to GitHub Pages
  # ===========================================================================
  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

