# TEMPORARY: one-shot job to gofmt + cargo fmt the new test files using CI's
# stable toolchains, then commit the result back. Removed once formatted.
name: _fmt-autofix
on:
  push:
    paths:
      - '.github/workflows/_fmt-autofix.yml'

permissions:
  contents: write

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: gofmt
        run: gofmt -w go
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Already formatted; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: gofmt + cargo fmt the integration tests"
          git push
