# TEMPORARY: one-shot job to run `cargo fmt` on the Rust SDK using CI's stable
# rustfmt, then commit the result back to this branch. Removed in the same change
# that flips the SDK CI fmt check to a hard gate.
name: _fmt-autofix
on:
  push:
    paths:
      - '.github/workflows/_fmt-autofix.yml'

permissions:
  contents: write

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Already formatted; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: cargo fmt the Rust SDK"
          git push
