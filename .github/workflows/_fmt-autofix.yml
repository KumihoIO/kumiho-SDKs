# TEMPORARY: format Go + Rust with CI's stable toolchains and commit back.
name: _fmt-autofix
on:
  push:
    branches:
      - feat/rust-go-sdks

permissions:
  contents: write

jobs:
  fmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: gofmt
        run: gofmt -w go
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Already formatted; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format (gofmt + cargo fmt)"
          git push
