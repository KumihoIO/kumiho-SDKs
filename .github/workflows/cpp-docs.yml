# Kumiho C++ SDK - Documentation Publishing Workflow
#
# Runs from the monorepo root. Generates Doxygen XML, builds Sphinx HTML
# (Breathe) from it, and deploys to docs.kumiho.io/cpp.

name: C++ Docs

on:
  push:
    branches:
      - main
    paths:
      - 'cpp/include/**'
      - 'cpp/src/**'
      - 'cpp/docs/**'
      - 'cpp/CMakeLists.txt'
      - 'cpp/Doxyfile'
      - '.github/workflows/cpp-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-cpp"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: cpp/docs/requirements.txt

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Extract version from CMakeLists.txt
        id: get_version
        run: |
          VERSION=$(python -c "import re; from pathlib import Path; text=Path('CMakeLists.txt').read_text(encoding='utf-8', errors='replace'); m=re.search(r'project\\([^\\)]*\\bVERSION\\s+([0-9]+\\.[0-9]+\\.[0-9]+(?:[-+._a-zA-Z0-9]*)?)\\b', text); import sys; sys.exit('Could not extract VERSION from CMakeLists.txt') if not m else None; print(m.group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building docs for Kumiho C++ SDK v$VERSION"

      - name: Generate Doxygen XML (for Sphinx/Breathe)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          mkdir -p docs/_build/doxygen
          # Patch PROJECT_NUMBER for this run (don't modify the tracked file)
          sed -E "s/^(PROJECT_NUMBER[[:space:]]*=).*/\1 \"$VERSION\"/" docs/Doxyfile.sphinx > docs/Doxyfile.sphinx.ci
          doxygen docs/Doxyfile.sphinx.ci

      - name: Build Sphinx documentation
        run: sphinx-build -b html docs docs/_build/html
        env:
          SPHINXBUILD: sphinx-build

      - name: Add version badge to output
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Kumiho C++ SDK v$VERSION" > docs/_build/html/VERSION.txt

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-docs-cpp
          path: cpp/docs/_build/html
          retention-days: 7

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

  deploy-docs:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://docs.kumiho.io/cpp

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: sphinx-docs-cpp
          path: docs-html

      - name: Deploy to docs.kumiho.io repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: kumihoclouds/docs.kumiho.io
          publish_branch: main
          publish_dir: docs-html
          destination_dir: cpp
          keep_files: true
          commit_message: "docs(cpp): update to v${{ needs.build-docs.outputs.version }}"
